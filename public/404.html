<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Saree Inventory</title>
  <script>
    // Single Page Apps for GitHub Pages
    // Adapted from https://github.com/rafgraph/spa-github-pages (MIT)
    // Redirects deep links to index.html with the path encoded so the SPA router can restore it.
    // 0 when serving from a custom domain root (e.g. saree-inventory.is-a.dev/)
    // 1 when serving under /<repo-name>/ on github.io
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
